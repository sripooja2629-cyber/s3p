services:
  - type: web
    name: s3p
    runtime: docker
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8501
      - key: FASTAPI_URL
        value: http://localhost:8000
      - key: USE_CLAUDE
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./data/ncert_chatbot.db
