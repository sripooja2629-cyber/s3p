services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ncert_backend
    ports:
      - "8010:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3:8b
      - DATABASE_URL=sqlite:///./data/ncert_chatbot.db
      - CHROMA_DB_PATH=./data/chroma_db
      - TTS_OUTPUT_DIR=./tts_output
      - EMBEDDING_MODEL=BAAI/bge-small-en
      - USE_CLAUDE=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
      - ./tts_output:/app/tts_output
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ncert_frontend
    ports:
      - "8502:8501"
    environment:
      - FASTAPI_URL=http://ncert_backend:8000
    depends_on:
      - backend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  ncert_data:
